<!DOCTYPE html>
<html>

<head>

    <title>Edit Student</title>

    <style>

        body{

            margin:0;

            padding:0;

            font-family:Arial, Helvetica, sans-serif;

            background-image:url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f');

            background-size:cover;

            background-position:center;

            background-repeat:no-repeat;

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;
        }

        .container{

            width:400px;

            background:rgba(255,255,255,0.2);

            backdrop-filter:blur(10px);

            padding:35px;

            border-radius:20px;

            box-shadow:0px 0px 20px rgba(0,0,0,0.4);
        }

        h1{

            text-align:center;

            color:white;

            margin-bottom:25px;

            text-shadow:2px 2px 10px black;
        }

        input{

            width:100%;

            padding:12px;

            margin-top:15px;

            border:none;

            border-radius:8px;

            font-size:15px;

            box-sizing:border-box;
        }

        button{

            width:100%;

            padding:12px;

            margin-top:20px;

            background:#007bff;

            color:white;

            border:none;

            border-radius:8px;

            font-size:16px;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            background:#0056b3;

            transform:scale(1.03);
        }

        .home-btn{

            display:inline-block;

            width:100%;

            text-align:center;

            margin-top:20px;

            padding:12px;

            background:#28a745;

            color:white;

            text-decoration:none;

            border-radius:8px;

            box-sizing:border-box;

            transition:0.3s;
        }

        .home-btn:hover{

            background:#1e7e34;

            transform:scale(1.03);
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Edit Student</h1>

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="username"
                   value="{{ student.username }}">

            <input type="email"
                   name="email"
                   value="{{ student.email }}">

            <button type="submit">

                Update Student

            </button>

        </form>

        <a href="/manage-students/"
           class="home-btn">

            Back Home

        </a>

    </div>

</body>

</html>
