<!DOCTYPE html>
<html>

<head>

    <title>Library Login</title>

    <style>

        body{

            margin:0;
            padding:0;

            font-family:Arial, Helvetica, sans-serif;

            height:100vh;

            background:

            linear-gradient(
                rgba(0,0,0,0.6),
                rgba(0,0,0,0.6)
            ),

            url('https://images.unsplash.com/photo-1521587760476-6c12a4b040da');

            background-size:cover;

            background-position:center;

            background-repeat:no-repeat;

        }

        .main-heading{

            text-align:center;

            color:white;

            padding-top:40px;

            font-size:55px;

            font-weight:bold;

            text-shadow:3px 3px 10px rgba(0,0,0,0.5);

        }

        .main-heading span{

            color:#ffe600;

            display:block;

            margin-top:10px;

            font-size:65px;

            letter-spacing:3px;

        }

        .login-container{

            width:400px;

            background:rgba(255,255,255,0.15);

            backdrop-filter:blur(10px);

            margin:auto;

            margin-top:70px;

            padding:40px;

            border-radius:15px;

            box-shadow:0px 0px 20px rgba(0,0,0,0.4);

        }

        .login-container h2{

            text-align:center;

            margin-bottom:30px;

            color:white;

            font-size:32px;

        }

        input{

            width:100%;

            padding:14px;

            margin-top:15px;

            border:none;

            border-radius:6px;

            font-size:16px;

        }

        button{

            width:100%;

            padding:14px;

            margin-top:25px;

            border:none;

            background:#007bff;

            color:white;

            font-size:18px;

            border-radius:6px;

            cursor:pointer;

            transition:0.3s;

        }

        button:hover{

            background:#0056b3;

            transform:scale(1.03);

        }

        .register-link{

            text-align:center;

            margin-top:20px;

        }

        .register-link a{

            color:#ffe600;

            text-decoration:none;

            font-weight:bold;

        }

        .footer-text{

            text-align:center;

            margin-top:20px;

            color:white;

            font-size:14px;

        }

    </style>

</head>

<body>

    <h1 class="main-heading">

        Welcome To

        <span>LIBRARY MANAGEMENT SYSTEM</span>

    </h1>

    <div class="login-container">

        <h2>Library Login</h2>

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="username"
                   placeholder="Enter Username">

            <input type="password"
                   name="password"
                   placeholder="Enter Password">

            <button type="submit">

                Login

            </button>

        </form>

        <div class="register-link">

            <a href="/register/">

                New Student? Register Here

            </a>

        </div>

        <div class="footer-text">

            Smart Library Management System

        </div>

    </div>

</body>

</html>
