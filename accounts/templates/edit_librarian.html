<!DOCTYPE html>
<html>

<head>

    <title>Edit Librarian</title>

    <style>

        body{

            margin:0;

            padding:0;

            font-family:Arial, Helvetica, sans-serif;

            background:linear-gradient(to right, #1e3c72, #2a5298);

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;
        }

        .container{

            width:400px;

            background:white;

            padding:35px;

            border-radius:15px;

            box-shadow:0px 0px 15px rgba(0,0,0,0.3);
        }

        h1{

            text-align:center;

            margin-bottom:25px;

            color:#333;
        }

        input{

            width:100%;

            padding:12px;

            margin-top:15px;

            border:1px solid #ccc;

            border-radius:5px;

            box-sizing:border-box;
        }

        button{

            width:100%;

            padding:12px;

            margin-top:20px;

            background:#007bff;

            color:white;

            border:none;

            border-radius:5px;

            cursor:pointer;

            font-size:16px;
        }

        button:hover{

            background:#0056b3;
        }

        .home-btn{

            display:inline-block;

            margin-top:20px;

            width:100%;

            text-align:center;

            padding:12px;

            background:#28a745;

            color:white;

            text-decoration:none;

            border-radius:5px;

            box-sizing:border-box;
        }

        .home-btn:hover{

            background:#1e7e34;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Edit Librarian</h1>

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="username"
                   value="{{ librarian.username }}">

            <input type="email"
                   name="email"
                   value="{{ librarian.email }}">

            <button type="submit">

                Update Librarian

            </button>

        </form>

        <a href="/manage-librarians/"
           class="home-btn">

            Back Home

        </a>

    </div>

</body>

</html>
