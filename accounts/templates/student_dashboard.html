<!DOCTYPE html>
<html>

<head>

    <title>Student Dashboard</title>

    <style>


body{

    margin:0;

    padding:0;

    font-family:Arial, Helvetica, sans-serif;

    background-image:url('https://images.unsplash.com/photo-1507842217343-583bb7270b66');

    background-size:cover;

    background-position:center;

    background-repeat:no-repeat;

    background-attachment:fixed;

    height:100vh;
}

.container{

    width:80%;

    margin:auto;

    padding-top:60px;
}

h1{

    text-align:center;

    color:white;

    margin-bottom:50px;

    font-size:45px;

    text-shadow:2px 2px 10px rgba(0,0,0,0.7);
}

.card-container{

    display:flex;

    justify-content:center;

    gap:30px;

    flex-wrap:wrap;
}

.card{

    width:250px;

    background:rgba(255,255,255,0.2);

    backdrop-filter:blur(10px);

    padding:30px;

    border-radius:20px;

    text-align:center;

    box-shadow:0px 4px 20px rgba(0,0,0,0.4);

    transition:0.3s;
}

.card:hover{

    transform:translateY(-10px) scale(1.03);
}

.card h2{

    color:white;

    margin-bottom:20px;
}

.card a{

    display:inline-block;

    margin-top:20px;

    padding:12px 22px;     

    background-color:#007bff;

    color:white;

    text-decoration:none;

    border-radius:8px;

    transition:0.3s;
}

.card a:hover{

    background-color:#0056b3;

    transform:scale(1.05);
}

</style>

    </style>

</head>

<body>

    <div class="container">

        <h1>Student Dashboard</h1>

        <div class="card-container">

            <div class="card">

                <h2>View Books</h2>

                <a href="/books/">

                    Open

                </a>

            </div>

            <div class="card">

                <h2>My Issued Books</h2>

                <a href="/my-books/">

                    View

                </a>

            </div>

          <div class="card">

            <h2>My Requests</h2>

            <a href="/my-requests/">

        View

    </a>

</div>

        </div>

    </div>

</body>

</html>
