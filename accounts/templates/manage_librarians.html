<!DOCTYPE html>
<html>

<head>

    <title>Manage Librarians</title>

    <style>

        body{

            font-family:Arial;

            background:#f0f2f5;

            padding:40px;
        }

        h1{

            text-align:center;

            margin-bottom:30px;
        }

        table{

            width:90%;

            margin:auto;

            border-collapse:collapse;

            background:white;

            box-shadow:0px 0px 10px gray;
        }

        th{

            background:#007bff;

            color:white;

            padding:15px;
        }

        td{

            padding:12px;

            text-align:center;

            border-bottom:1px solid #ddd;
        }

        .edit-btn{

            padding:8px 15px;

            background:#28a745;

            color:white;

            text-decoration:none;

            border-radius:5px;
        }

        .delete-btn{

            padding:8px 15px;

            background:red;

            color:white;

            text-decoration:none;

            border-radius:5px;
        }


        .home-btn{

    display:inline-block;

    padding:12px 25px;

    background:linear-gradient(to right, #007bff, #00c6ff);

    color:white;

    text-decoration:none;

    border-radius:30px;

    font-size:16px;

    font-weight:bold;

    transition:0.3s;
}

.home-btn:hover{

    transform:scale(1.05);

    background:linear-gradient(to right, #0056b3, #0096c7);
}

    </style>

</head>

<body>

    <h1>Manage Librarians</h1>

    <table>

        <tr>

            <th>Username</th>

            <th>Email</th>

            <th>Edit</th>

            <th>Delete</th>

        </tr>

        {% for librarian in librarians %}

        <tr>

            <td>{{ librarian.username }}</td>

            <td>{{ librarian.email }}</td>

            <td>

                <a href="/edit-librarian/{{ librarian.id }}/"
                   class="edit-btn">

                    Edit

                </a>

            </td>

            <td>

                <a href="/delete-librarian/{{ librarian.id }}/"
                   class="delete-btn">

                    Delete

                </a>

            </td>

        </tr>

        {% endfor %}

    </table>
    <br><br>

<div style="text-align:center;">

    <a href="/admin-dashboard/"
       class="home-btn">

        Back Home

    </a>

</div>

</body>

</html>
