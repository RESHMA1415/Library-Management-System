<!DOCTYPE html>
<html>

<head>

    <title>My Books</title>

    <style>

        body{

            margin:0;
            padding:30px;
            font-family:Arial, Helvetica, sans-serif;
            background-color:#f0f2f5;
        }

        h1{

            text-align:center;
            color:#333;
            margin-bottom:30px;
        }

        .table-container{

            width:80%;
            margin:auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        table{

            width:100%;
            border-collapse:collapse;
        }

        th{

            background-color:#007bff;
            color:white;
            padding:15px;
        }

        td{

            padding:12px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        tr:hover{

            background-color:#f5f5f5;
        }
        .home-btn{

    display:inline-block;

    padding:14px 30px;

    background:linear-gradient(to right, #007bff, #00c6ff);

    color:white;

    text-decoration:none;

    border-radius:30px;

    font-size:18px;

    font-weight:bold;

    box-shadow:0px 4px 15px rgba(0,0,0,0.3);

    transition:0.3s;
}

.home-btn:hover{

    transform:scale(1.05);

    background:linear-gradient(to right, #0056b3, #0096c7);

}

    </style>

</head>

<body>

    <h1>My Issued Books</h1>

    <div class="table-container">

        <table>

    <tr>

        <th>Book</th>

        <th>Issue Date</th>

        <th>Due Date</th>

        <th>Fine</th>

        <th>Return</th>

    </tr>

    {% for item in books %}

    <tr>

        <td>{{ item.book.title }}</td>

        <td>{{ item.issue_date }}</td>

        <td>{{ item.due_date }}</td>

        <td>₹ {{ item.fine }}</td>

        <td>

            {% if item.return_request == False %}

                <a href="/request-return/{{ item.id }}/">

                    Request Return

                </a>

            {% else %}

                Requested

            {% endif %}

        </td>

    </tr>

    {% endfor %}

</table>
 <br><br>

<div style="text-align:center;">

    <a href="/student-dashboard/"
       class="home-btn">

        Back Home

    </a>

</div>
