<!DOCTYPE html>
<html>

<head>

    <title>My Requests</title>

    <style>

        body{

            font-family:Arial;
            background:#f0f2f5;
            padding:30px;
        }

        h1{

            text-align:center;
            margin-bottom:30px;
        }

        .container{

            width:80%;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        table{

            width:100%;
            border-collapse:collapse;
        }

        th{

            background:#007bff;
            color:white;
            padding:15px;
        }

        td{

            padding:12px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }
        .home-btn{

    display:inline-block;

    padding:14px 30px;

    background:linear-gradient(to right, #007bff, #00c6ff);

    color:white;

    text-decoration:none;

    border-radius:30px;

    font-size:18px;

    font-weight:bold;

    box-shadow:0px 4px 15px rgba(0,0,0,0.3);

    transition:0.3s;
}

.home-btn:hover{

    transform:scale(1.05);

    background:linear-gradient(to right, #0056b3, #0096c7);

}

    </style>

</head>

<body>

    <h1>My Book Requests</h1>

    <div class="container">

        <table>

            <tr>

                <th>Book</th>

                <th>Status</th>

            </tr>

            {% for req in requests %}

            <tr>

                <td>{{ req.book.title }}</td>

                <td>

                    {% if req.status == 'Approved' %}

                        <span style="color:green; font-weight:bold;">

                            Approved

                        </span>

                    {% elif req.status == 'Out of Stock' %}

                        <span style="color:red; font-weight:bold;">

                            Out of Stock

                        </span>

                    {% else %}

                        <span style="color:orange; font-weight:bold;">

                            Pending

                        </span>

                    {% endif %}

                </td>

            </tr>

            {% endfor %}

        </table>
        <br><br>

<div style="text-align:center;">

    <a href="/student-dashboard/"
       class="home-btn">

        Back Home

    </a>

</div>

    </div>

</body>

</html>
