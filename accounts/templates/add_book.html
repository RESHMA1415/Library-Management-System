<!DOCTYPE html>
<html>

<head>

    <title>Add Book</title>

    <style>

        body{

            margin:0;

            padding:0;

            font-family:Arial, Helvetica, sans-serif;

            background-image:url('https://images.unsplash.com/photo-1521587760476-6c12a4b040da');

            background-size:cover;

            background-position:center;

            background-repeat:no-repeat;

            background-attachment:fixed;

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;
        }

        .main-container{

            width:100%;

            display:flex;

            flex-direction:column;

            justify-content:center;

            align-items:center;
        }

        .container{

            width:400px;

            background:rgba(255,255,255,0.2);

            backdrop-filter:blur(12px);

            padding:35px;

            border-radius:20px;

            box-shadow:0px 4px 20px rgba(0,0,0,0.4);
        }

        h1{

            text-align:center;

            color:white;

            margin-bottom:30px;

            text-shadow:2px 2px 10px black;
        }

        input{

            width:100%;

            padding:12px;

            margin-top:12px;

            border:none;

            border-radius:8px;

            font-size:15px;

            box-sizing:border-box;
        }

        button{

            width:100%;

            padding:12px;

            margin-top:20px;

            border:none;

            background-color:#007bff;

            color:white;

            font-size:16px;

            border-radius:8px;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            background-color:#0056b3;

            transform:scale(1.02);
        }

        .home-btn{

            display:inline-block;

            margin-top:25px;

            padding:14px 30px;

            background:linear-gradient(to right, #007bff, #00c6ff);

            color:white;

            text-decoration:none;

            border-radius:30px;

            font-size:18px;

            font-weight:bold;

            box-shadow:0px 4px 15px rgba(0,0,0,0.3);

            transition:0.3s;
        }

        .home-btn:hover{

            transform:scale(1.05);

            background:linear-gradient(to right, #0056b3, #0096c7);
        }

    </style>

</head>

<body>

    <div class="main-container">

        <div class="container">

            <h1>Add Book</h1>

            <form method="POST">

                {% csrf_token %}

                <input type="text"
                       name="title"
                       placeholder="Book Title">

                <input type="text"
                       name="author"
                       placeholder="Author Name">

                <input type="text"
                       name="isbn"
                       placeholder="ISBN">

                <input type="number"
                       name="quantity"
                       placeholder="Quantity">

                <input type="text"
                       name="category"
                       placeholder="Enter Category">

                <button type="submit">

                    Add Book

                </button>

            </form>

        </div>

        {% if request.user.role == 'admin' %}

<a href="/admin-dashboard/"
   class="home-btn">

    Back Home

</a>

{% elif request.user.role == 'librarian' %}

<a href="/librarian-dashboard/"
   class="home-btn">

    Back Home

</a>

{% endif %}

        </a>

    </div>

</body>

</html>
