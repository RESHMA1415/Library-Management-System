<!DOCTYPE html>
<html>

<head>

    <title>Pending Students</title>

    <style>

        body{

            font-family:Arial;

            background:#f0f2f5;

            padding:40px;
        }

        h1{

            text-align:center;

            margin-bottom:30px;
        }

        table{

            width:80%;

            margin:auto;

            border-collapse:collapse;

            background:white;

            box-shadow:0px 0px 10px gray;
        }

        th{

            background:#007bff;

            color:white;

            padding:15px;
        }

        td{

            padding:12px;

            text-align:center;

            border-bottom:1px solid #ddd;
        }

        .approve-btn{

            padding:8px 18px;

            background:#28a745;

            color:white;

            text-decoration:none;

            border-radius:5px;
        }

        .back-home{

    text-align:center;

    margin-top:40px;
}

.back-home a{

    display:inline-block;

    padding:12px 25px;

    background:#007bff;

    color:white;

    text-decoration:none;

    border-radius:5px;
 
    font-size:16px;

    font-weight:bold;
}

.back-home a:hover{

    background:#0056b3;
}

    </style>

</head>

<body>

    <h1>Pending Students</h1>

    <table>

        <tr>

            <th>Username</th>

            <th>Email</th>

            <th>Approve</th>

        </tr>

        {% for student in students %}

        <tr>

            <td>{{ student.username }}</td>

            <td>{{ student.email }}</td>

            <td>

                <a href="/approve-student/{{ student.id }}/"
                   class="approve-btn">

                    Approve

                </a>

            </td>

        </tr>

        {% endfor %}

    </table>
    <div class="back-home">

    <a href="/admin-dashboard/">

        Back Home

    </a>

</div>

</body>

</html>
