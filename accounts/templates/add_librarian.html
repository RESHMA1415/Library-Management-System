<!DOCTYPE html>
<html>

<head>

    <title>Add Librarian</title>

    <style>

        body{

            margin:0;

            padding:0;

            font-family:Arial, Helvetica, sans-serif;

            background-image:url('https://images.unsplash.com/photo-1521587760476-6c12a4b040da');

            background-size:cover;

            background-position:center;

            background-repeat:no-repeat;
  
            background-attachment:fixed;

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;
        }

        .container{ 

            width:400px;

            background:rgba(255,255,255,0.2);

            backdrop-filter:blur(12px);

            padding:35px;

            border-radius:20px;

            box-shadow:0px 4px 20px rgba(0,0,0,0.4);

            text-align:center;
        }

        h1{

            color:white;

            margin-bottom:30px;

            text-shadow:2px 2px 10px black;
        }

        input{

            width:100%;

            padding:12px;

            margin-top:15px;

            border:none;

            border-radius:8px;

            font-size:15px;

            box-sizing:border-box;
        }

        button{

            width:100%;

            padding:12px;

            margin-top:25px;

            border:none;

            background:#007bff;

            color:white;

            font-size:16px;

            border-radius:8px;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            background:#0056b3;

            transform:scale(1.03);
        }

        .home-btn{

            display:inline-block;

            margin-top:20px;

            padding:12px 25px;

            background:linear-gradient(to right, #007bff, #00c6ff);

            color:white;

            text-decoration:none;

            border-radius:30px;

            font-size:16px;

            font-weight:bold;

            transition:0.3s;
        }

        .home-btn:hover{

            transform:scale(1.05);

            background:linear-gradient(to right, #0056b3, #0096c7);
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Add Librarian</h1>

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="username"
                   placeholder="Enter Username">

            <input type="email"
                   name="email"
                   placeholder="Enter Email">

            <input type="password"
                   name="password"
                   placeholder="Enter Password">

            <button type="submit">

                Create Librarian

            </button>

        </form>

        <a href="/admin-dashboard/"
           class="home-btn">

            Back Home

        </a>

    </div>

</body>

</html>
