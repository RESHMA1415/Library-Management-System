<!DOCTYPE html>
<html>

<head>

    <title>Book Requests</title>

    <style>
        .home-btn{

    display:inline-block;

    padding:12px 25px;

    background:#007bff;

    color:white;

    text-decoration:none;

    border-radius:8px;

    font-size:18px;

    transition:0.3s;

}

.home-btn:hover{

    background:#0056b3;

    transform:scale(1.05);

}

        body{

            font-family:Arial;
            background:#f0f2f5;
            padding:30px;
        }

        h1{

            text-align:center;
            margin-bottom:30px;
        }

        .container{

            width:85%;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        table{

            width:100%;
            border-collapse:collapse;
        }

        th{

            background:#007bff;
            color:white;
            padding:15px;
        }

        td{

            padding:12px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        .approve{

            background:green;
            color:white;
            padding:8px 15px;
            text-decoration:none;
            border-radius:5px;
        }

        .stock{

            color:red;
            font-weight:bold;
        }

    </style>

</head>

<body>

    <h1>Student Book Requests</h1>

    <div class="container">

        <table>

            <tr>

                <th>Student</th>

                <th>Book</th>

                <th>Available Quantity</th>

                <th>Status</th>

                <th>Action</th>

            </tr>

            {% for req in requests %}

            <tr>

                <td>{{ req.student.username }}</td>

                <td>{{ req.book.title }}</td>

                <td>{{ req.book.quantity }}</td>

                <td>{{ req.status }}</td>

                <td>

                    {% if req.book.quantity > 0 %}

                    <a href="/approve-request/{{ req.id }}/"
                       class="approve">

                        Approve

                    </a>

                    {% else %}

                    <span class="stock">

                       <a href="/restock-book/{{ req.book.id }}/"

                       style="
                       background:green;
                       color:white;
                       padding:8px 15px;
                       text-decoration:none;
                        border-radius:5px;
                         ">

                        Restock

                    </a>

                    </span>

    </a>

</div>

                    {% endif %}

                </td>

            </tr>

            {% endfor %}

        </table>
        <br><br>

<div style="text-align:center;">

    <a href="/librarian-dashboard/"
       class="home-btn">

        Back Home

    </a>

</div>

    </div>

</body>

</html>
