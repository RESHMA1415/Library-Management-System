<!DOCTYPE html>
<html>

<head>

    <title>Student Registration</title>

    <style>

        body{

            margin:0;
            padding:0;
            font-family:Arial;
            background:linear-gradient(to right, #56ab2f, #a8e063);

            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{

            width:350px;
            background:white;
            padding:35px;
            border-radius:12px;
            box-shadow:0px 0px 15px rgba(0,0,0,0.3);
        }

        h1{

            text-align:center;
            margin-bottom:25px;
        }

        input{

            width:100%;
            padding:12px;
            margin-top:15px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{

            width:100%;
            padding:12px;
            margin-top:20px;
            border:none;
            background:#007bff;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{

            background:#0056b3;
        }

        .login-link{

            text-align:center;
            margin-top:20px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Student Registration</h1>

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="username"
                   placeholder="Enter Username">

            <input type="email"
                   name="email"
                   placeholder="Enter Email">

            <input type="password"
                   name="password"
                   placeholder="Enter Password">

            <button type="submit">

                Register

            </button>

        </form>

        <div class="login-link">

            <a href="/">

                Already have account? Login

            </a>

        </div>

    </div>

</body>

</html>
