<!DOCTYPE html>
<html>

<head>

    <title>Pending Librarians</title>

    <style>

        body{

            font-family:Arial;

            background:#f0f2f5;

            padding:40px;
        }

        h1{

            text-align:center;

            margin-bottom:30px;
        }

        table{

            width:80%;

            margin:auto;

            border-collapse:collapse;

            background:white;

            box-shadow:0px 0px 10px gray;
        }

        th{

            background:#007bff;

            color:white;

            padding:15px;
        }

        td{

            padding:12px;

            text-align:center;

            border-bottom:1px solid #ddd;
        }

        a{

            padding:8px 15px;

            background:green;

            color:white;

            text-decoration:none;

            border-radius:5px;
        }

    </style>

</head>

<body>

    <h1>Pending Librarians</h1>

    <table>

        <tr>

            <th>Username</th>

            <th>Email</th>

            <th>Action</th>

        </tr>

        {% for librarian in librarians %}

        <tr>

            <td>{{ librarian.username }}</td>

            <td>{{ librarian.email }}</td>

            <td>

                <a href="/approve-librarian/{{ librarian.id }}/">

                    Approve

                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</body>

</html>
