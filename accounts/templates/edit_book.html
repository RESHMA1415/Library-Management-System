<!DOCTYPE html>
<html>

<head>

    <title>Edit Book</title>

    <style>

        body{

            font-family:Arial;

            background:#f0f2f5;

            padding:50px;

        }

        .container{

            width:400px;

            margin:auto;

            background:white;

            padding:30px;

            border-radius:10px;

            box-shadow:0px 0px 10px gray;

        }

        h1{

            text-align:center;

            margin-bottom:25px;

        }

        input{

            width:100%;

            padding:12px;

            margin-top:15px;

            border:1px solid #ccc;

            border-radius:5px;

        }

        button{

            width:100%;

            padding:12px;

            margin-top:20px;

            background:#007bff;

            color:white;

            border:none;

            border-radius:5px;

            cursor:pointer;

        }

        button:hover{

            background:#0056b3;

        }

        .home-btn{

    display:inline-block;

    padding:12px 25px;

    background:linear-gradient(to right, #007bff, #00c6ff);

    color:white;

    text-decoration:none;

    border-radius:30px;

    font-size:16px;

    font-weight:bold;

    transition:0.3s;
}

.home-btn:hover{

    transform:scale(1.05);

    background:linear-gradient(to right, #0056b3, #0096c7);
}

    </style>

</head>

<body>

    <div class="container">

        <h1>Edit Book</h1>

       <form method="POST">

    {% csrf_token %}

    <input type="text"
           name="title"
           value="{{ book.title }}">

    <input type="text"
           name="author"
           value="{{ book.author }}">

    <input type="text"
           name="isbn"
           value="{{ book.isbn }}">

    <input type="number"
           name="quantity"
           value="{{ book.quantity }}">

    <input type="text"
           name="category"
           value="{{ book.category }}"
           placeholder="Enter Category">

    <button type="submit">

        Update Book

    </button>

</form>
<button type="submit">

    Update Book

</button>

</form>

<div style="text-align:center; margin-top:20px;">

    {% if user.role == 'admin' %}

        <a href="/admin-dashboard/"
           class="home-btn">

            Back Home

        </a>

    {% else %}

        <a href="/librarian-dashboard/"
           class="home-btn">

            Back Home

        </a>

    {% endif %}

</div>
